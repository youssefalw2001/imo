services:
  - type: web
    name: rugs-fun
    runtime: static
    staticPublishPath: ./
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /capture.html
        destination: /capture.html
      - type: rewrite
        source: /analyzer.html
        destination: /analyzer.html
      - type: rewrite
        source: /seed_calc.html
        destination: /seed_calc.html
      - type: rewrite
        source: /*
        destination: /index.html
